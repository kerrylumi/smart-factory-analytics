x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.1.8}
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER:-airflow}:${AIRFLOW_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Rakenduse andmebaasi ühendus — kasutatav DAG-ides PostgresHook kaudu
    AIRFLOW_CONN_ANALYTICS_DB: postgresql://${POSTGRES_USER:-praktikum}:${POSTGRES_PASSWORD:-praktikum}@db:5432/${POSTGRES_DB:-praktikum}
    # dbt ühenduseparameetrid (dbt profiles.yml kasutab neid)
    POSTGRES_HOST: db
    POSTGRES_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER:-praktikum}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praktikum}
    POSTGRES_DB: ${POSTGRES_DB:-praktikum}
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-dbt-postgres==1.10.0 dbt-core==1.11.11}
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/dbt_project:/opt/airflow/dbt_project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    airflow-db:
      condition: service_healthy
    db:
      condition: service_healthy

services:
  hivemq:
    image: hivemq/hivemq-ce:latest
    container_name: hivemq
    ports:
      - "1883:1883"
      - "8083:8000"
    #    networks:
    #      - umh-network
    restart: unless-stopped

  simulator:
    build:
      context: ./metalfab-simulator
      dockerfile: Dockerfile
    container_name: metalfab-simulator
    environment:
      - MQTT_BROKER=hivemq
      - MQTT_PORT=1883
    command: [ "run", "--broker", "hivemq", "--level", "4" ]
    depends_on:
      - hivemq
    #    networks:
    #      - umh-network
    restart: unless-stopped

  db:
    image: pgduckdb/pgduckdb:18-v1.1.1
    container_name: metalfab-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ${DATA_DIR:-./data}:/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      retries: 10

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: metalfab-dbt
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dbt_project:/dbt
    working_dir: /dbt
    tty: true

  redpanda-connect:
    image: docker.redpanda.com/redpandadata/connect
    volumes:
      - ./config/redpanda-connect.yaml:/connect.yaml
      - ${DATA_DIR:-./data}/lake:/data/lake
    command: [ "-c", "/connect.yaml" ]
    depends_on:
      - hivemq
      - db

  airflow-db:
    image: postgres:16
    container_name: metalfab-airflow-db
    environment:
      POSTGRES_USER: ${AIRFLOW_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB:-airflow}
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${AIRFLOW_USER:-airflow}" ]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # --- Airflow API server (UI + REST API) ---
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    container_name: metalfab-airflow-api
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow scheduler ---
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    container_name: metalfab-airflow-scheduler
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8974/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow DAG processor ---
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    container_name: metalfab-airflow-dagproc
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # --- Airflow esmane seadistus (andmebaasi migratsioon + admin kasutaja) ---
  airflow-init:
    <<: *airflow-common
    container_name: metalfab-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, set AIRFLOW_UID environment variable."
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Running airflow config list to create default config file if missing."
        /entrypoint airflow config list >/dev/null
        echo
        echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"

  # --- Superset metaandmebaas ---
  superset-db:
    image: postgres:16
    container_name: metalfab-superset-db
    environment:
      POSTGRES_USER: ${SUPERSET_DB_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset}
      POSTGRES_DB: ${SUPERSET_DB_NAME:-superset_meta}
    volumes:
      - superset-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SUPERSET_DB_USER:-superset} -d ${SUPERSET_DB_NAME:-superset_meta}" ]
      interval: 5s
      retries: 10
    restart: always

  # --- Superset ühekordne initsialiseerimine (migratsioonid + admin kasutaja) ---
  superset-init:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: metalfab-superset-init
    depends_on:
      superset-db:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - superset-home:/app/superset_home
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      DATABASE_URI: "postgresql+psycopg2://${SUPERSET_DB_USER:-superset}:${SUPERSET_DB_PASSWORD:-superset}@superset-db:5432/${SUPERSET_DB_NAME:-superset_meta}"
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
    command:
      - /bin/sh
      - -c
      - "superset db upgrade && superset fab create-admin --username $${ADMIN_USERNAME} --firstname Admin --lastname User --email $${ADMIN_EMAIL} --password $${ADMIN_PASSWORD} && superset init"
    restart: "no"

  # --- Apache Superset näidikulaud ---
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: metalfab-superset
    depends_on:
      superset-init:
        condition: service_completed_successfully
    ports:
      - "${SUPERSET_PORT_HOST:-8088}:8088"
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py
      - superset-home:/app/superset_home
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      DATABASE_URI: "postgresql+psycopg2://${SUPERSET_DB_USER:-superset}:${SUPERSET_DB_PASSWORD:-superset}@superset-db:5432/${SUPERSET_DB_NAME:-superset_meta}"
      SECRET_KEY: ${SUPERSET_SECRET_KEY}
    command: [ "/app/docker/entrypoints/run-server.sh" ]
    restart: always

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:latest
    container_name: metalfab-jupyter
    ports:
      - "8888:8888" # Jupyteri kasutajaliides
      - "4040:4040" # Spark UI (uue SparkContexti loomisel võib pordinumber suureneda)
    volumes:
      - ./notebooks/:/home/jovyan/work
      - ${DATA_DIR:-./data}:/home/jovyan/data
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-praktikum}
      # Andmebaasi ühendus notebooki JDBC-kirjutuse jaoks (loetakse os.environ-ist)
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-praktikum}
      - POSTGRES_USER=${POSTGRES_USER:-praktikum}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-praktikum}
    #      - PYSPARK_SUBMIT_ARGS=--packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1,io.delta:delta-spark_2.13:4.2.0 pyspark-shell
    command: >
      start-notebook.py --ServerApp.token=${JUPYTER_TOKEN:-praktikum} --ServerApp.password='' --ServerApp.allow_origin='*' --ServerApp.allow_remote_access=True

volumes:
  pgdata:
  airflow-db-volume:
  superset-db-volume:
  superset-home:
