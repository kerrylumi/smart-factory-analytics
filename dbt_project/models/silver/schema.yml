version: 2

models:
  - name: silver_electricity_prices
    description: Eesti elektrihind UTC ja EEST ajatempelistega + EUR/kWh.
    columns:
      - name: ts_utc
        description: 15-min vahemiku algus UTC-s.
        data_tests:
          - not_null
          - unique
      - name: ts_eest
        description: Sama ajatempel Europe/Tallinn ajavööndis.
        data_tests:
          - not_null
      - name: price_eur_mwh
        description: Päevahind EUR/MWh-s.
        data_tests:
          - not_null
      - name: price_eur_kwh
        description: Päevahind EUR/kWh-s (= MWh / 1000).
        data_tests:
          - not_null

  - name: silver_factory_telemetry
    description: Tehase telemeetria puhastatud long-formaadis (NULL-filter + EEST ajatempel).
    columns:
      - name: machine
        description: Masina ID.
        data_tests:
          - not_null
      - name: tag
        description: Mõõdiku nimi.
        data_tests:
          - not_null
      - name: value
        description: Numbriline väärtus (NULL-id filtreeritud).
        data_tests:
          - not_null
      - name: ts_utc
        description: Mõõtmise ajatempel UTC-s.
        data_tests:
          - not_null
